<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>use-flash-cells — Live Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 24px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: #f8fafc;
  }
  .subtitle {
    font-size: 0.875rem;
    color: #94a3b8;
    margin-bottom: 32px;
  }
  .subtitle code {
    font-family: "SF Mono", "Fira Code", monospace;
    background: #1e2533;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  button {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85 }
  #btnStart { background: #3b82f6; color: #fff }
  #btnStop  { background: #475569; color: #fff }
  #btnOnce  { background: #8b5cf6; color: #fff }
  .label { font-size: 0.8rem; color: #64748b; margin-left: 4px }

  /* Table */
  .table-wrap {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #1e2d3d;
    background: #141922;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    text-align: left;
    padding: 10px 16px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    border-bottom: 1px solid #1e2d3d;
    background: #0f1117;
  }
  tbody tr { border-bottom: 1px solid #1a2332 }
  tbody tr:last-child { border-bottom: none }
  td {
    padding: 0;
    font-size: 0.875rem;
    font-variant-numeric: tabular-nums;
  }
  td.sym {
    padding: 12px 16px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 0.04em;
    font-size: 0.8rem;
    width: 80px;
  }
  .cell {
    display: block;
    padding: 12px 16px;
    width: 100%;
    transition: background 0.25s ease, color 0.25s ease;
    color: #e2e8f0;
  }
  .cell.up   { background: rgba(74, 222, 128, 0.18); color: #4ade80 }
  .cell.down { background: rgba(248, 113, 113, 0.18); color: #f87171 }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    font-size: 0.78rem;
    color: #64748b;
  }
  .legend span { display: flex; align-items: center; gap: 6px }
  .dot {
    width: 10px; height: 10px; border-radius: 3px;
  }
  .dot.up   { background: rgba(74, 222, 128, 0.5) }
  .dot.down { background: rgba(248, 113, 113, 0.5) }

  /* Log */
  .log-title {
    margin-top: 32px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
    margin-bottom: 8px;
  }
  .log {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.75rem;
    color: #64748b;
    height: 120px;
    overflow-y: auto;
    border: 1px solid #1e2d3d;
    border-radius: 8px;
    padding: 10px 14px;
    background: #0a0e14;
  }
  .log .entry { line-height: 1.7 }
  .log .entry.up   { color: #4ade80 }
  .log .entry.down { color: #f87171 }
</style>
</head>
<body>

<h1>use-flash-cells</h1>
<p class="subtitle">
  Headless hook demo — simulates a live price feed and flashes cells
  using <code>getFlash(rowId, field)</code> → <code>'up' | 'down' | null</code>
</p>

<div class="controls">
  <button id="btnStart">▶ Start feed</button>
  <button id="btnStop">■ Stop</button>
  <button id="btnOnce">⚡ Tick once</button>
  <span class="label">Duration: <strong id="durLabel">600 ms</strong></span>
  <input id="durRange" type="range" min="100" max="2000" step="100" value="600"
         style="width:120px;accent-color:#3b82f6" />
</div>

<div class="table-wrap">
  <table id="priceTable">
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Price</th>
        <th>Bid</th>
        <th>Ask</th>
        <th>Volume</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="legend">
  <span><span class="dot up"></span> Value increased</span>
  <span><span class="dot down"></span> Value decreased</span>
</div>

<p class="log-title">Change log</p>
<div class="log" id="log"></div>

<script>
// ── Minimal re-implementation of useFlashCells (no React) for the demo ───
// Mirrors the exact same logic as the real hook.

function createFlashTracker(options) {
  const { keyField, fields, duration = 600, onChange } = options
  let prev = new Map()          // rowId → Map(field → number)
  const flashMap = new Map()    // "rowId:field" → 'up' | 'down'
  const timers   = new Map()    // "rowId:field" → timeoutId

  function update(data) {
    const updates = []

    for (const row of data) {
      const rowId   = String(row[keyField])
      const prevRow = prev.get(rowId)
      if (!prevRow) continue

      for (const field of fields) {
        const currVal = Number(row[field])
        const prevVal = prevRow.get(field)
        // NaN guard — mirrors the fix in useFlashCells.ts
        if (
          prevVal !== undefined &&
          !Number.isNaN(prevVal) &&
          !Number.isNaN(currVal) &&
          prevVal !== currVal
        ) {
          updates.push([`${rowId}:${field}`, currVal > prevVal ? 'up' : 'down', rowId, field])
        }
      }
    }

    for (const [key, dir, rowId, field] of updates) {
      flashMap.set(key, dir)
      const existing = timers.get(key)
      if (existing) clearTimeout(existing)
      timers.set(key, setTimeout(() => {
        flashMap.delete(key)
        timers.delete(key)
        onChange?.()
      }, duration))
    }

    // Update snapshot
    const snapshot = new Map()
    for (const row of data) {
      const rowId = String(row[keyField])
      const fm = new Map()
      for (const field of fields) fm.set(field, Number(row[field]))
      snapshot.set(rowId, fm)
    }
    prev = snapshot

    if (updates.length > 0) onChange?.(updates)
  }

  function getFlash(rowId, field) {
    return flashMap.get(`${String(rowId)}:${field}`) ?? null
  }

  return { update, getFlash }
}

// ── Seed data ─────────────────────────────────────────────────────────────

let rows = [
  { id: 'AAPL',  price: 189.25, bid: 189.20, ask: 189.30, volume: 48_210_000 },
  { id: 'MSFT',  price: 415.80, bid: 415.75, ask: 415.85, volume: 19_880_000 },
  { id: 'NVDA',  price: 875.60, bid: 875.50, ask: 875.70, volume: 33_550_000 },
  { id: 'GOOGL', price: 175.40, bid: 175.35, ask: 175.45, volume: 22_140_000 },
  { id: 'AMZN',  price: 184.90, bid: 184.85, ask: 184.95, volume: 25_670_000 },
  { id: 'META',  price: 502.30, bid: 502.25, ask: 502.35, volume: 14_390_000 },
]

const FIELDS = ['price', 'bid', 'ask', 'volume']
let duration = 600

const tracker = createFlashTracker({
  keyField: 'id',
  fields: FIELDS,
  get duration() { return duration },
  onChange: render,
})

// Seed the snapshot without flashing
tracker.update(rows)

// ── Rendering ─────────────────────────────────────────────────────────────

const tbody = document.getElementById('tbody')
const logEl = document.getElementById('log')

function fmt(field, value) {
  if (field === 'volume') return (value / 1_000_000).toFixed(2) + 'M'
  return value.toFixed(2)
}

function render(updates) {
  // Build or update rows
  for (const row of rows) {
    let tr = document.getElementById(`row-${row.id}`)
    if (!tr) {
      tr = document.createElement('tr')
      tr.id = `row-${row.id}`
      tr.innerHTML = `
        <td class="sym">${row.id}</td>
        <td id="${row.id}-price"><span class="cell">${fmt('price', row.price)}</span></td>
        <td id="${row.id}-bid"><span class="cell">${fmt('bid', row.bid)}</span></td>
        <td id="${row.id}-ask"><span class="cell">${fmt('ask', row.ask)}</span></td>
        <td id="${row.id}-volume"><span class="cell">${fmt('volume', row.volume)}</span></td>
      `
      tbody.appendChild(tr)
    }

    for (const field of FIELDS) {
      const td   = document.getElementById(`${row.id}-${field}`)
      const span = td.querySelector('.cell')
      const dir  = tracker.getFlash(row.id, field)
      span.textContent = fmt(field, row[field])
      span.className = 'cell' + (dir ? ' ' + dir : '')
    }
  }

  // Log changes
  if (updates && updates.length > 0) {
    const now = new Date().toLocaleTimeString('en-US', { hour12: false })
    for (const [, dir, rowId, field] of updates) {
      const row  = rows.find(r => r.id === rowId)
      const val  = row ? fmt(field, row[field]) : '?'
      const entry = document.createElement('div')
      entry.className = 'entry ' + dir
      entry.textContent = `${now}  ${rowId.padEnd(5)} ${field.padEnd(7)} ${dir === 'up' ? '▲' : '▼'} ${val}`
      logEl.prepend(entry)
      // Cap log at 50 entries
      while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild)
    }
  }
}

render()

// ── Tick simulation ───────────────────────────────────────────────────────

function randomTick() {
  // Randomly mutate 1–3 cells
  const count = 1 + Math.floor(Math.random() * 3)
  rows = rows.map(row => {
    if (Math.random() > count / rows.length) return row
    const updated = { ...row }
    const field = FIELDS[Math.floor(Math.random() * (FIELDS.length - 1))] // skip volume sometimes
    const delta = (Math.random() - 0.48) * 2   // slight upward bias
    if (field === 'volume') {
      updated.volume = Math.max(1_000_000, updated.volume + Math.round(delta * 500_000))
    } else {
      updated[field] = Math.max(0.01, parseFloat((updated[field] + delta).toFixed(2)))
      // Keep bid < price < ask spread realistic
      if (field === 'price') {
        updated.bid = parseFloat((updated.price - 0.05).toFixed(2))
        updated.ask = parseFloat((updated.price + 0.05).toFixed(2))
      }
    }
    return updated
  })
  tracker.update(rows)
}

// ── Controls ──────────────────────────────────────────────────────────────

let interval = null

document.getElementById('btnStart').addEventListener('click', () => {
  if (interval) return
  interval = setInterval(randomTick, 400)
})

document.getElementById('btnStop').addEventListener('click', () => {
  clearInterval(interval)
  interval = null
})

document.getElementById('btnOnce').addEventListener('click', randomTick)

const durRange = document.getElementById('durRange')
const durLabel = document.getElementById('durLabel')
durRange.addEventListener('input', () => {
  duration = parseInt(durRange.value, 10)
  durLabel.textContent = duration + ' ms'
})
</script>
</body>
</html>
